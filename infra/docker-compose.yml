services:
  postgres:
    image: postgres:15
    container_name: kinetic_postgres

    environment:
      POSTGRES_USER: kinetic
      POSTGRES_PASSWORD: kinetic
      POSTGRES_DB: kinetic

    ports:
      - "5432:5432"

    volumes:
      - kinetic_pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinetic -d kinetic"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  app:
    profiles: ["app"]
    build:
      context: ../
      dockerfile: backend/Dockerfile
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://kinetic:kinetic@postgres:5432/kinetic
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

volumes:
  kinetic_pgdata:
