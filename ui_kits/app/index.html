<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kinetic — App UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: #0d0e11;
    color: #f0f2f5;
    -webkit-font-smoothing: antialiased;
  }
  * { scrollbar-width: thin; scrollbar-color: #2a2d38 transparent; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2d38; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="WorkflowRunner.jsx"></script>
<script type="text/babel" src="AIGenerator.jsx"></script>
<script type="text/babel" src="WorkflowBuilder.jsx"></script>

<script type="text/babel">
function App() {
  const [page, setPage] = React.useState('runner');

  React.useEffect(() => {
    if (window.lucide) lucide.createIcons();
  });

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <KSidebar active={page} onNavigate={setPage}/>
      <main style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {/* Top bar */}
        <div style={{ padding: '12px 20px', borderBottom: `1px solid ${KColors.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 600, color: KColors.fg1 }}>
              {page === 'runner' ? 'Workflow runner' : page === 'ai' ? 'AI workflow generator' : 'Workflow builder'}
            </div>
            <div style={{ fontSize: 12, color: KColors.fg3, marginTop: 1 }}>
              {page === 'runner'
                ? 'Choose a pre-defined workflow template and run it.'
                : page === 'ai'
                ? 'Describe a financial workflow. Kinetic will generate and execute it.'
                : 'Drag and drop steps to visually compose a crypto workflow.'}
            </div>
          </div>
          <span style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: 11, color: KColors.fg3, background: KColors.overlay, padding: '3px 8px', borderRadius: 4, border: `1px solid ${KColors.border}` }}>
            MOCK MODE
          </span>
        </div>

        {/* Screen content */}
        <div style={{ flex: 1, overflow: 'hidden' }}>
          {page === 'runner' ? <WorkflowRunner/> : page === 'ai' ? <AIGenerator/> : <WorkflowBuilder/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
