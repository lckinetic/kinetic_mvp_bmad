name: workflow-api-smoke

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "release/**"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[dev]"

      - name: Run workflow API smoke tests (MOCK_MODE)
        run: |
          python -m pytest \
            backend/app/tests/test_workflows_headless_lifecycle.py \
            backend/app/tests/test_workflows_openapi.py \
            -q
